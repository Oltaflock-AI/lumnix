<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Lumi AI assistant">
  <circle cx="60" cy="60" r="56" fill="none" stroke="#FF0066" stroke-width="2" opacity="0.3"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#FF0066" stroke-width="1.5" opacity="0.2"/>
  <defs>
    <radialGradient id="lumiGradient" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFB3D9" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF0066" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="lumiGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="35" fill="url(#lumiGradient)" filter="url(#lumiGlow)"/>
  <circle cx="48" cy="48" r="12" fill="white" opacity="0.5"/>
  <circle cx="46" cy="46" r="8" fill="white" opacity="0.3"/>
  <circle cx="50" cy="55" r="3" fill="white"/>
  <circle cx="49.5" cy="54" r="1.5" fill="#FF0066" opacity="0.7"/>
  <circle cx="70" cy="55" r="3" fill="white"/>
  <circle cx="70.5" cy="54" r="1.5" fill="#FF0066" opacity="0.7"/>
  <path d="M 50 65 Q 60 71 70 65" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <g opacity="0.8">
    <circle cx="20" cy="25" r="2" fill="#FF0066"/>
    <circle cx="100" cy="35" r="2" fill="#FF0066"/>
    <circle cx="25" cy="90" r="1.5" fill="#00D4AA"/>
    <circle cx="95" cy="85" r="1.5" fill="#00D4AA"/>
  </g>
</svg>
